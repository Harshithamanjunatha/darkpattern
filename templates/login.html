<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>

body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.form-box{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    width:400px;
}

h2{
    margin-bottom:20px;
    text-align:center;
    color:#ef4444;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
}

button{
    width:100%;
    padding:14px;
    margin-top:25px;
    background:#ef4444;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#dc2626;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

p{
    margin-top:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="form-box">

    <h2>Company Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Company Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        New company?
        <a href="/register">Register</a>
    </p>

</div>

</body>
</html>
