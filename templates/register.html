<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#1e293b;
    padding:40px;
    border-radius:15px;
    width:400px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    color:#ef4444;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#334155;
    color:white;
    font-size:15px;
}

button{
    width:100%;
    padding:14px;
    margin-top:25px;
    border:none;
    border-radius:10px;
    background:#ef4444;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#dc2626;
}

p{
    text-align:center;
    margin-top:20px;
    color:white;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

    <h1>Company Registration</h1>

    <form method="POST">

        <input
            type="text"
            name="company_name"
            placeholder="Company Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Company Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p>
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>

</html>
